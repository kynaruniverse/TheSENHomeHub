<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#243d29"/>
  <title>SEN Type Guides | The SEN Home Hub</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    body { background: var(--linen); }

    .page-hero {
      background: linear-gradient(150deg, var(--forest-deep), var(--forest-mid), #7a9a60);
      padding: 2.2rem 1.75rem 3rem; text-align: center; color: #fff;
      position: relative; overflow: hidden;
    }
    .page-hero::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
      background: var(--linen); clip-path: ellipse(55% 100% at 50% 100%);
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: rgba(255,255,255,0.72); text-decoration: none;
      font-size: 0.82rem; font-weight: 700; margin-bottom: 1rem; transition: color 0.15s;
      position: relative; z-index: 1;
    }
    .back-link:hover { color: #fff; }
    .hero-icon { font-size: 3rem; margin: 0 auto 0.8rem; position: relative; z-index: 1; }
    .page-hero h1 { font-size: clamp(1.7rem,4vw,2.5rem); margin-bottom: 0.45rem; position: relative; z-index: 1; }
    .page-hero p  { font-size: 0.92rem; opacity: 0.8; position: relative; z-index: 1; max-width: 480px; margin: 0 auto; }

    /* search + filter */
    .search-bar {
      background: #fff; border-bottom: 2px solid var(--linen-dark);
      padding: 1rem 1.75rem;
      display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;
      position: sticky; top: var(--topbar-h); z-index: 10;
    }
    .search-input {
      flex: 1; min-width: 180px;
      background: var(--linen); border: 2px solid var(--linen-dark);
      border-radius: var(--r-full); padding: 0.5rem 1rem;
      font-family: 'Nunito', sans-serif; font-size: 0.88rem; color: var(--text);
      outline: none; transition: border-color 0.18s;
    }
    .search-input:focus { border-color: var(--forest-mid); }
    .cat-filter-btn {
      background: var(--linen); border: 2px solid var(--linen-dark);
      border-radius: var(--r-full); padding: 0.35rem 0.85rem;
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.78rem;
      color: var(--text-mid); cursor: pointer; transition: all 0.15s;
    }
    .cat-filter-btn:hover, .cat-filter-btn.active {
      background: var(--forest); color: #fff; border-color: var(--forest);
    }

    /* SEN grid */
    .sen-grid-wrap { padding: 1.75rem; max-width: 1160px; margin: 0 auto; }
    .sen-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    .sen-card {
      background: #fff; border-radius: var(--r-lg);
      border: 2.5px solid var(--linen-dark);
      padding: 1.2rem; cursor: pointer;
      transition: all 0.18s; text-align: left;
    }
    .sen-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .sen-card.hidden { display: none; }
    .sen-card-icon { font-size: 2rem; margin-bottom: 0.5rem; display: block; }
    .sen-card-name { font-family: 'Lora', serif; font-size: 1rem; font-weight: 700; color: var(--forest-deep); margin-bottom: 0.25rem; }
    .sen-card-short { font-size: 0.78rem; color: var(--text-mid); line-height: 1.5; }
    .sen-card-tag {
      display: inline-block; margin-top: 0.5rem;
      border-radius: var(--r-full); padding: 0.18rem 0.65rem;
      font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;
    }

    /* detail panel */
    .detail-overlay {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(20,35,22,0.5); backdrop-filter: blur(5px);
      display: none; align-items: center; justify-content: center; padding: 1rem;
    }
    .detail-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
    .detail-panel {
      background: var(--linen); border-radius: var(--r-xl);
      width: 100%; max-width: 640px; max-height: 88vh;
      overflow-y: auto; box-shadow: var(--shadow-lg);
      animation: slideUp 0.28s ease both;
    }
    .dp-header {
      padding: 1.4rem 1.5rem 1rem;
      display: flex; align-items: flex-start; gap: 1rem;
      border-bottom: 2px solid var(--linen-dark);
    }
    .dp-icon { font-size: 2.5rem; flex-shrink: 0; }
    .dp-title { flex: 1; }
    .dp-title h2 { font-family: 'Lora', serif; color: var(--forest-deep); font-size: 1.3rem; margin-bottom: 0.15rem; }
    .dp-title p  { font-size: 0.82rem; color: var(--text-mid); }
    .dp-close {
      background: var(--linen-dark); border: none; border-radius: 50%;
      width: 30px; height: 30px; cursor: pointer; font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-mid); flex-shrink: 0; transition: background 0.18s;
    }
    .dp-close:hover { background: var(--clay-pale); }
    .dp-body { padding: 1.4rem 1.5rem 1.75rem; }
    .dp-section { margin-bottom: 1.25rem; }
    .dp-section h3 { font-family: 'Lora', serif; color: var(--forest-deep); font-size: 0.98rem; margin-bottom: 0.5rem; }
    .dp-section p  { font-size: 0.83rem; color: var(--text-mid); line-height: 1.65; }
    .dp-section ul { padding-left: 1.2rem; }
    .dp-section li { font-size: 0.83rem; color: var(--text-mid); line-height: 1.6; margin-bottom: 0.25rem; }
    .dp-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .dp-tag {
      border-radius: var(--r-full); padding: 0.22rem 0.75rem;
      font-size: 0.72rem; font-weight: 800;
    }
    .dp-resources {
      background: var(--forest-pale); border-radius: var(--r-md);
      padding: 1rem 1.1rem; margin-top: 1rem;
    }
    .dp-resources h4 { font-family: 'Lora', serif; font-size: 0.9rem; color: var(--forest-deep); margin-bottom: 0.5rem; }
    .dp-resources a {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.8rem; font-weight: 700; color: var(--forest);
      text-decoration: none; margin-right: 0.75rem; margin-bottom: 0.3rem;
    }
    .dp-resources a:hover { color: var(--forest-deep); text-decoration: underline; }

    .no-results-msg { text-align: center; padding: 3rem 1rem; color: var(--text-mid); display: none; }
    .no-results-msg.show { display: block; }

    @media (max-width: 480px) {
      .sen-cards-grid { grid-template-columns: repeat(2, 1fr); }
      .sen-grid-wrap { padding: 1.25rem 1rem; }
      .search-bar { padding: 0.75rem 1rem; }
    }
  </style>
</head>
<body>
<header class="topbar">
  <a class="topbar-logo" href="/index.html">
    <div class="topbar-badge">SHH</div>
    <div class="topbar-name">The SEN Home Hub <small>🇬🇧 UK Home Education</small></div>
  </a>
  <div class="topbar-actions">
    <button class="topbar-pill" onclick="SHH.openModal('modal-saved')">♡ <span data-fav-count>0</span></button>
  </div>
</header>

<div class="page">
  <div class="page-hero">
    <a class="back-link" href="/index.html">← Back to Hub</a>
    <div class="hero-icon">🧩</div>
    <h1>SEN Type Guides</h1>
    <p>Plain-English guides to each type of SEN — what it means, how it affects learning, and how to help at home</p>
  </div>

  <div class="search-bar">
    <input class="search-input" id="sen-search" placeholder="🔍 Search SEN types…" oninput="filterSEN()"/>
    <button class="cat-filter-btn active" data-cat="all" onclick="setCat('all',this)">All</button>
    <button class="cat-filter-btn" data-cat="neurodevelopmental" onclick="setCat('neurodevelopmental',this)">Neurodevelopmental</button>
    <button class="cat-filter-btn" data-cat="learning" onclick="setCat('learning',this)">Learning</button>
    <button class="cat-filter-btn" data-cat="emotional" onclick="setCat('emotional',this)">Social &amp; Emotional</button>
    <button class="cat-filter-btn" data-cat="sensory" onclick="setCat('sensory',this)">Sensory &amp; Physical</button>
  </div>

  <div class="sen-grid-wrap">
    <div class="sen-cards-grid" id="sen-cards-grid"></div>
    <div class="no-results-msg" id="sen-no-results">No SEN types found matching your search. Try different words.</div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel" id="detail-panel">
    <div class="dp-header">

      </div>
      <button class="dp-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="dp-body" id="dp-body"></div>
  </div>
</div>

  },
  {
    id:'global-delay', icon:'🤍', name:'Global Developmental Delay', subtitle:'GDD',
    cat:'learning',
    tagBg:'#f0f0f0', tagColor:'#3a3a3a', tagLabel:'Learning Difficulty',
    short:'When a child reaches developmental milestones significantly later than expected across multiple areas.',
    what:'Global Developmental Delay (GDD) is used when a child under 5 shows significant delays in two or more areas of development — motor skills, speech and language, cognition, social, and/or activities of daily living. It may later lead to a diagnosis of intellectual disability or another specific condition.',
    signs:['Late motor milestones (sitting, walking)','Delayed speech and language','Difficulty with self-care tasks','Learning takes longer and requires more repetition','Short attention span','May have difficulty with abstract concepts'],
    home_ed:['Repetition is key — revisit the same skills in many different ways','Use highly concrete, hands-on learning activities','Build on strengths — what does your child love and respond to?','Early intervention services (SALT, OT, physio) can work alongside home education','Break every skill into the tiniest possible steps','Celebrate all progress, however small'],
    resources:[{label:'Counting Board',url:'/children/maths.html'},{label:'Phonics Board',url:'/children/phonics.html'},{label:'Feelings & Me',url:'/children/feelings.html'},{label:'Reward Charts',url:'/parent/printables.html'}],
  },
];

let currentCat = 'all';

function renderCards(data) {
  const grid = document.getElementById('sen-cards-grid');
  grid.innerHTML = data.map(s => `
    <div class="sen-card" data-id="${s.id}" data-cat="${s.cat}" onclick="openDetail('${s.id}')">
      <span class="sen-card-icon">${s.icon}</span>
      <div class="sen-card-name">${s.name}</div>
      <div class="sen-card-short">${s.short}</div>
      <span class="sen-card-tag" style="background:${s.tagBg};color:${s.tagColor}">${s.tagLabel}</span>
    </div>
  `).join('');
}

function filterSEN() {
  const q = document.getElementById('sen-search').value.toLowerCase();
  const cards = document.querySelectorAll('.sen-card');
  let visible = 0;
  cards.forEach(card => {
    const id   = card.dataset.id;
    const cat  = card.dataset.cat;
    const data = SEN_DATA.find(s => s.id === id);
    const matchCat = currentCat === 'all' || cat === currentCat;
    const matchQ   = !q || data.name.toLowerCase().includes(q) || data.short.toLowerCase().includes(q);
    const show = matchCat && matchQ;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('sen-no-results').classList.toggle('show', visible === 0);
}

function setCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterSEN();
}

function openDetail(id) {
  const s = SEN_DATA.find(d => d.id === id);
  if (!s) return;
  document.getElementById('dp-icon').textContent = s.icon;
  document.getElementById('dp-name').textContent = s.name;
  document.getElementById('dp-subtitle').textContent = s.subtitle;
  document.getElementById('dp-body').innerHTML = `
    <div class="dp-tags">
      <span class="dp-tag" style="background:${s.tagBg};color:${s.tagColor}">${s.tagLabel}</span>
    </div>
    <div class="dp-section">
      <h3>What is ${s.name}?</h3>
      <p>${s.what}</p>
    </div>
    <div class="dp-section">
      <h3>Signs to look out for</h3>
      <ul>${s.signs.map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>
    <div class="dp-section">
      <h3>Home education tips</h3>
      <ul>${s.home_ed.map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>
    <div class="dp-resources">
      <h4>🔗 Useful resources on SHH</h4>
      ${s.resources.map(r=>`<a href="${r.url}">→ ${r.label}</a>`).join('')}
    </div>
  `;
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-panel').scrollTop = 0;
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
}

document.getElementById('detail-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('detail-overlay')) closeDetail();
});

renderCards(SEN_DATA);
</script>
</body>
</html>
